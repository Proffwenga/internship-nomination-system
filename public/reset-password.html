<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Set Password — Internship Nomination System</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-box" id="formBox">
  <h2>Set Your Password</h2>
  <p style="font-size:15px;color:var(--muted)">Choose a password (minimum 8 characters) to activate your account.</p>
  <div class="field"><label>New Password</label><input type="password" id="password" autocomplete="new-password"></div>
  <div class="field"><label>Confirm Password</label><input type="password" id="password2" autocomplete="new-password"></div>
  <button id="submitBtn" style="width:100%">Set password</button>
  <div id="msg" class="msg" style="display:none"></div>
</div>
<div class="login-box" id="doneBox" style="display:none">
  <h2>Password Set</h2>
  <p id="doneMsg" style="font-size:15px"></p>
  <div class="link-row">
    <a href="login.html">Placement officer login</a> &middot; <a href="dashboard.html">HR / Admin login</a>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');

document.getElementById('submitBtn').addEventListener('click', async () => {
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;

  if (!token) return showErr('Missing reset token. Check the link in your email.');
  if (password.length < 8) return showErr('Password must be at least 8 characters.');
  if (password !== password2) return showErr('Passwords do not match.');

  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || 'Could not set password.');
    document.getElementById('formBox').style.display = 'none';
    document.getElementById('doneBox').style.display = 'block';
    document.getElementById('doneMsg').textContent = body.message;
  } catch (e) {
    showErr(e.message);
  }

  function showErr(text) {
    msg.textContent = text;
    msg.className = 'msg err';
    msg.style.display = 'block';
  }
});
</script>
</body>
</html>
